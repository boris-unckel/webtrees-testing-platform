receivers:
  # Nur HTTP/protobuf (Port 4318): webtrees-PHP exportiert ueber HTTP, der
  # gRPC-Receiver (Port 4317) war seit dem Protokollwechsel ungenutzt.
  # Der collector-interne Export an Jaeger (otlp/jaeger, jaeger:4317) bleibt gRPC.
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://localhost:8080"
            - "http://webtrees:80"
            - "http://webtrees"
          allowed_headers:
            - "*"
          max_age: 7200

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  file:
    path: /artifacts/traces.json
    append: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [otlp/jaeger, file]
