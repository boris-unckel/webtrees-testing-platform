# webtrees Test-Stack — Podman Compose
# 6 Container, 1 Netzwerk (webtrees-test-net)

services:
  webtrees:
    build:
      context: .
      dockerfile: Containerfile.webtrees
    container_name: webtrees
    ports:
      - "8080:80"
    volumes:
      # webtrees-Source read-only einbinden (WEBTREES_SOURCE, Default: ./upstream/webtrees)
      - ${WEBTREES_SOURCE:-./upstream/webtrees}:/var/www/html:ro,z
      # data- und vendor-Verzeichnis beschreibbar (überschreiben ro-Mount)
      - webtrees-data:/var/www/html/data
      - webtrees-vendor:/var/www/html/vendor
      # Optionales Modul-Mounting: MODULE_PATH=/pfad/zum/modul MODULE_NAME=db_foo make test-integration
      # Default: leeres Verzeichnis statt /dev/null (SELinux lsetxattr auf /dev/null nicht erlaubt)
      - ${MODULE_PATH:-./.empty-module}:/var/www/html/modules_v4/${MODULE_NAME:-_none}:ro,z
      # GEDCOM-Fixtures
      - ./fixtures:/fixtures:ro,z
      # Test-Layer für Container-interne Ausführung
      - ./layer1-static:/tests/layer1-static:ro,z
      - ./layer2-unit:/tests/layer2-unit:ro,z
      - ./layer3-integration:/tests/layer3-integration:ro,z
      # tests/data schreibbar (Upstream-Unit-Tests schreiben temporäre Dateien)
      # Das Named-Volume überschreibt den ro-Mount; setup-webtrees.sh seeded es aus
      # dem Pfad /webtrees-tests-data-seed (zweiter ro-Mount der selben Quelle).
      - webtrees-unit-tests-data:/var/www/html/tests/data
      # Seeding-Quelle: webtrees tests/data als ro-Mount auf separatem Pfad
      - ${WEBTREES_SOURCE:-./upstream/webtrees}/tests/data:/webtrees-tests-data-seed:ro,z
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webtrees_test}
      MYSQL_USER: ${MYSQL_USER:-webtrees}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webtrees_test}
      # OpenTelemetry
      OTEL_PHP_AUTOLOAD_ENABLED: ${OTEL_PHP_AUTOLOAD_ENABLED:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-webtrees}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-false}
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
    depends_on:
      - mysql
    networks:
      - webtrees-test-net
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql:
    image: docker.io/library/mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-webtrees_test}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-webtrees_test}
      MYSQL_USER: ${MYSQL_USER:-webtrees}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-webtrees_test}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_bin
    networks:
      - webtrees-test-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-webtrees_test}"]
      interval: 5s
      timeout: 3s
      retries: 10

  playwright:
    build:
      context: .
      dockerfile: Containerfile.playwright
    container_name: playwright
    volumes:
      - ./layer4-e2e:/tests/e2e:ro,z
      - ./layer5-performance:/tests/performance:ro,z
      - ./artifacts:/artifacts:rw,z
    environment:
      BASE_URL: http://webtrees:80
    depends_on:
      - webtrees
    networks:
      - webtrees-test-net
    # Kein dauerhafter Service — wird per `make test-e2e` gestartet
    command: ["sleep", "infinity"]

  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    ports:
      - "4317:4317"
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro,z
      - ./artifacts:/artifacts:rw,z
    networks:
      - webtrees-test-net

  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - webtrees-test-net

  adminer:
    image: docker.io/library/adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - mysql
    networks:
      - webtrees-test-net
    profiles:
      - debug

  # --- Sicherheitstest-Track (Distribution + Wizard) ---
  # @see docs/security_plan.md Abschnitt 6.3

  webtrees-security:
    image: webtrees-security
    container_name: webtrees-security
    profiles:
      - security
    ports:
      - "8082:80"
    depends_on:
      mysql-security:
        condition: service_healthy
    networks:
      - webtrees-test-net
    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql-security:
    image: docker.io/library/mysql:8.0
    container_name: mysql-security
    profiles:
      - security
    environment:
      MYSQL_ROOT_PASSWORD: security_test
      MYSQL_DATABASE: webtrees_security
      MYSQL_USER: webtrees
      MYSQL_PASSWORD: security_test
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_bin
    networks:
      - webtrees-test-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - mysql-security-data:/var/lib/mysql

volumes:
  webtrees-data:
  webtrees-vendor:
  webtrees-unit-tests-data:
  mysql-data:
  mysql-security-data:

networks:
  webtrees-test-net:
    driver: bridge
