name: webtrees Tests

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      webtrees_ref:
        description: 'webtrees git ref to test (branch, tag)'
        default: 'main'

jobs:
  statischer-test:
    name: Statischer Test
    runs-on: ubuntu-latest
    env:
      WEBTREES_REF: ${{ github.event.inputs.webtrees_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install podman-compose
        run: pip install podman-compose
      - name: Setup
        run: make setup
      - name: Run static analysis
        run: make test-static
      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis
          path: artifacts/layer1/
          retention-days: 7

  komponententest:
    name: Komponententest (PHPUnit)
    needs: statischer-test
    runs-on: ubuntu-latest
    env:
      WEBTREES_REF: ${{ github.event.inputs.webtrees_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install podman-compose
        run: pip install podman-compose
      - name: Setup
        run: make setup
      - name: Run unit tests
        run: make test-unit
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: artifacts/layer2/
          retention-days: 7

  komponentenintegrationstest:
    name: Komponentenintegrationstest (PHPUnit + MySQL)
    needs: komponententest
    runs-on: ubuntu-latest
    env:
      WEBTREES_REF: ${{ github.event.inputs.webtrees_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install podman-compose
        run: pip install podman-compose
      - name: Setup
        run: make setup
      - name: Run integration tests
        run: make test-integration
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: artifacts/layer3/
          retention-days: 7

  systemtest:
    name: Systemtest (Playwright)
    needs: komponentenintegrationstest
    runs-on: ubuntu-latest
    env:
      WEBTREES_REF: ${{ github.event.inputs.webtrees_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install podman-compose
        run: pip install podman-compose
      - name: Setup
        run: make setup
      - name: Run E2E tests
        run: make test-e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/layer4/
          retention-days: 7

  performanztest:
    name: Performanztest
    needs: systemtest
    runs-on: ubuntu-latest
    env:
      WEBTREES_REF: ${{ github.event.inputs.webtrees_ref || 'main' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install podman-compose
        run: pip install podman-compose
      - name: Setup
        run: make setup
      - name: Run performance tests
        run: make test-performance
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: artifacts/layer5/
          retention-days: 7
